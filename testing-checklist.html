<style>

  .progress-bar {
    width: 100%;
    height: 6px;
    background: #2a2a4a;
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c41e3a, #4caf50);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .phase {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    margin-bottom: 16px;

  .phase-header {
    display: flex;
    align-items: center;
    justify-content: space-between;

  }

    font-size: 0.9rem;

    text-decoration: line-through;
  }
  .test-item.fail .test-label { color: #c41e3a; }
  .status-btns {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .status-btn {
    min-width: 52px;
    height: 34px;
    padding: 0 8px;
    border: 2px solid #333;
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;

  <span><span class="legend-dot" style="background:#c41e3a"></span> Fail</span>

</div>

<div class="stats-bar">

  <div class="stat"><div class="stat-num yellow" id="skip-count">0</div><div class="stat-label">Skip</div></div>
  <div class="stat"><div class="stat-num" id="remaining-count" style="color:#e0e0e0">0</div><div class="stat-label">Remaining</div></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

<div id="phases"></div>

<div class="actions-bar">

function buildPhases() {
  const container = document.getElementById('phases');
  DATA.forEach((phase, pi) => {
    const div = document.createElement('div');
    div.className = 'phase';
    div.id = `phase-${pi}`;

    const allItems = phase.items || phase.sections.flatMap(s => s.items);
    const count = allItems.length;

    div.innerHTML = `
      <div class="phase-header" onclick="togglePhase(${pi})">
        <span class="phase-title">${phase.phase}</span>
        <span class="phase-count" id="pcount-${pi}">0/${count}</span>
      </div>
      <div class="phase-body" id="pbody-${pi}"></div>
    `;

    const body = div.querySelector('.phase-body');

    if (phase.items) {
      phase.items.forEach(item => body.appendChild(buildItem(item)));
    } else {
      phase.sections.forEach(sec => {
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.textContent = sec.label;
        body.appendChild(lbl);
        sec.items.forEach(item => body.appendChild(buildItem(item)));
      });
    }

    container.appendChild(div);
  });
}

function buildItem(item) {
  const row = document.createElement('div');
  row.className = 'test-item';
  row.id = `row-${item.id}`;
  row.dataset.itemId = item.id;
  row.innerHTML = `
    <div class="test-top">
      <div class="status-btns">
        <button class="status-btn pass-btn" title="Pass" onclick="setStatus('${item.id}','pass')">PASS</button>
        <button class="status-btn fail-btn" title="Fail" onclick="setStatus('${item.id}','fail')">FAIL</button>
        <button class="status-btn skip-btn" title="Skip" onclick="setStatus('${item.id}','skip')">SKIP</button>
      </div>
      <div class="test-label">${item.text}</div>
    </div>
    <div class="test-note">
      <input type="text" placeholder="type issue here if FAIL..." id="note-${item.id}" onchange="save()" />
    </div>
  `;
  return row;
}

let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem('cfb-test-state');
    if (saved) state = JSON.parse(saved);
  } catch {}
  // Apply saved state
  Object.keys(state).forEach(id => {
    const s = state[id];
    if (s.status) applyStatus(id, s.status);
    if (s.note) {
      const inp = document.getElementById(`note-${id}`);
      if (inp) inp.value = s.note;
    }
  });
}

function save() {
  // Collect notes
  document.querySelectorAll('.test-note input').forEach(inp => {
    const id = inp.id.replace('note-', '');
    if (!state[id]) state[id] = {};
    state[id].note = inp.value;
  });
  localStorage.setItem('cfb-test-state', JSON.stringify(state));
  updateCounts();
}

function setStatus(id, status) {
  if (!state[id]) state[id] = {};
  if (state[id].status === status) {
    state[id].status = '';
    applyStatus(id, '');
  } else {
    state[id].status = status;
    applyStatus(id, status);
  }
  save();
}

function applyStatus(id, status) {
  const row = document.getElementById(`row-${id}`);
  if (!row) return;
  row.classList.remove('checked', 'fail');
  row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  if (status === 'pass') {
    row.classList.add('checked');
    row.querySelector('.pass-btn').classList.add('active');
  } else if (status === 'fail') {
    row.classList.add('fail');
    row.querySelector('.fail-btn').classList.add('active');
  } else if (status === 'skip') {
    row.querySelector('.skip-btn').classList.add('active');
  }
}

function updateCounts() {
  let total = 0, pass = 0, fail = 0, skip = 0;
  document.querySelectorAll('.test-item').forEach(row => {
    total++;
    const id = row.dataset.itemId;
    const s = state[id]?.status;
    if (s === 'pass') pass++;
    else if (s === 'fail') fail++;
    else if (s === 'skip') skip++;
  });
  const remaining = total - pass - fail - skip;
  document.getElementById('total-count').textContent = total;
  document.getElementById('pass-count').textContent = pass;
  document.getElementById('fail-count').textContent = fail;
  document.getElementById('skip-count').textContent = skip;
  document.getElementById('remaining-count').textContent = remaining;
  const pct = total > 0 ? ((pass + fail + skip) / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Phase counts
  DATA.forEach((phase, pi) => {
    const allItems = phase.items || phase.sections.flatMap(s => s.items);
    let done = 0;
    allItems.forEach(item => {
      if (state[item.id]?.status) done++;
    });
    const el = document.getElementById(`pcount-${pi}`);
    if (el) el.textContent = `${done}/${allItems.length}`;
  });
}

function togglePhase(pi) {
  document.getElementById(`phase-${pi}`).classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.phase').forEach(p => p.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.phase').forEach(p => p.classList.remove('open'));
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = {};
  localStorage.removeItem('cfb-test-state');
  document.querySelectorAll('.test-item').forEach(row => {
    row.classList.remove('checked', 'fail');
    row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  });
  document.querySelectorAll('.test-note input').forEach(inp => inp.value = '');
  updateCounts();
}

function formatResults(failsOnly) {
  let lines = [];
  lines.push('# CFB Social — Test Results');
  lines.push('');

  let hasIssues = false;

  DATA.forEach(phase => {
    const allItems = phase.items || phase.sections.flatMap(s => s.items);
    const phaseResults = [];

    allItems.forEach(item => {
      const s = state[item.id]?.status || 'untested';
      const note = state[item.id]?.note || '';

      if (failsOnly && s !== 'fail') return;

      const marker = s === 'pass' ? 'PASS' : s === 'fail' ? 'FAIL' : s === 'skip' ? 'SKIP' : 'UNTESTED';
      let line = `[${marker}] ${item.text}`;
      if (note) line += ` — "${note}"`;
      phaseResults.push(line);

      if (s === 'fail') hasIssues = true;
    });

    if (phaseResults.length > 0) {
      lines.push(`## ${phase.phase}`);
      phaseResults.forEach(r => lines.push(r));
      lines.push('');
    }
  });

  if (failsOnly && !hasIssues) {
    return 'No failures found. All tested items passed!';
  }

  // Summary at top
  let total = 0, pass = 0, fail = 0, skip = 0;
  document.querySelectorAll('.test-item').forEach(() => total++);
  Object.values(state).forEach((s) => {
    if (s.status === 'pass') pass++;
    else if (s.status === 'fail') fail++;
    else if (s.status === 'skip') skip++;
  });

  const summary = `Summary: ${pass} passed, ${fail} failed, ${skip} skipped, ${total - pass - fail - skip} untested\n`;
  lines.splice(1, 0, summary);

  if (fail > 0) {
    lines.push('## Action Items (Failures to Fix)');
    DATA.forEach(phase => {
      const allItems = phase.items || phase.sections.flatMap(s => s.items);
      allItems.forEach(item => {
        if (state[item.id]?.status === 'fail') {
          const note = state[item.id]?.note || 'no details given';
          lines.push(`- ${phase.phase} > ${item.text}: ${note}`);
        }
      });
    });
  }

  return lines.join('\n');
}

function copyResults() {
  const text = formatResults(false);
  navigator.clipboard.writeText(text).then(() => showToast('Full results copied!'));
}

function copyFailsOnly() {
  const text = formatResults(true);
  navigator.clipboard.writeText(text).then(() => showToast('Failures copied!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
buildPhases();
loadState();
updateCounts();
// Open first phase by default
document.getElementById('phase-0').classList.add('open');
</script>
