<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&amp;family=Source+Sans+3:wght@600&amp;display=swap');
    </style>
    <!-- Subtle noise texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
  </defs>

  <!-- Outer block -->
  <rect x="10" y="10" width="280" height="280" rx="6" fill="#3b2f1e"/>

  <!-- Inner relief -->
  <rect x="18" y="18" width="264" height="264" rx="4" fill="#2a1f14"/>

  <!-- Inset surface -->
  <rect x="25" y="25" width="250" height="250" rx="3" fill="#3b2f1e" filter="url(#grain)"/>

  <!-- CFB large text -->
  <text x="150" y="170" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="120" fill="#f4efe4" opacity="0.95" letter-spacing="8">CFB</text>

  <!-- SOCIAL below -->
  <text x="150" y="220" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="42" fill="#c49a2f" letter-spacing="10">SOCIAL</text>

  <!-- Top label -->
  <rect x="55" y="28" width="190" height="22" fill="#8b1a1a" rx="2"/>
  <text x="150" y="44" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="11" fill="#f4efe4" letter-spacing="4">COLLEGE FOOTBALL</text>

  <!-- Bottom label -->
  <rect x="85" y="252" width="130" height="18" fill="#8b1a1a" rx="2"/>
  <text x="150" y="265" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="9" fill="#f4efe4" letter-spacing="4">EST. 2026</text>

  <!-- Corner accents -->
  <rect x="28" y="28" width="20" height="3" fill="#c49a2f"/>
  <rect x="28" y="28" width="3" height="20" fill="#c49a2f"/>
  <rect x="252" y="28" width="20" height="3" fill="#c49a2f"/>
  <rect x="269" y="28" width="3" height="20" fill="#c49a2f"/>
  <rect x="28" y="269" width="20" height="3" fill="#c49a2f"/>
  <rect x="28" y="252" width="3" height="20" fill="#c49a2f"/>
  <rect x="252" y="269" width="20" height="3" fill="#c49a2f"/>
  <rect x="269" y="252" width="3" height="20" fill="#c49a2f"/>
</svg>