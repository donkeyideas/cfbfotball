<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Source+Sans+3:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Helmet shell -->
  <path d="M160 30 Q280 30 280 140 Q280 200 250 230 L230 230 Q230 250 220 260 L180 260 Q175 250 175 235 L100 235 Q70 210 60 180 Q40 140 60 90 Q80 30 160 30Z" fill="#8b1a1a" stroke="#3b2f1e" stroke-width="3"/>

  <!-- Helmet highlight stripe -->
  <path d="M160 35 Q170 35 170 40 L170 140 Q170 180 160 200 Q150 180 150 140 L150 40 Q150 35 160 35Z" fill="#c49a2f" opacity="0.8"/>

  <!-- Facemask -->
  <path d="M100 160 Q80 160 75 170 Q70 180 80 195 L100 195" fill="none" stroke="#3b2f1e" stroke-width="4" stroke-linecap="round"/>
  <path d="M100 170 Q85 170 82 178 Q80 185 88 192" fill="none" stroke="#3b2f1e" stroke-width="3" stroke-linecap="round"/>
  <path d="M100 180 Q90 180 88 186" fill="none" stroke="#3b2f1e" stroke-width="3" stroke-linecap="round"/>

  <!-- CFB on helmet -->
  <text x="190" y="155" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="50" fill="#f4efe4" transform="rotate(-5, 190, 135)" letter-spacing="2">CFB</text>

  <!-- Earhole -->
  <ellipse cx="115" cy="180" rx="8" ry="12" fill="#3b2f1e"/>
  <ellipse cx="115" cy="180" rx="5" ry="9" fill="#2a1f14"/>

  <!-- Text below -->
  <text x="160" y="290" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="24" fill="#3b2f1e" letter-spacing="3">CFB SOCIAL</text>
  <text x="160" y="310" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="10" fill="#6b5d4d" letter-spacing="4">EST. 2026</text>
</svg>