<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Source+Sans+3:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Outer serrated edge (stamp feel) -->
  <circle cx="160" cy="160" r="150" fill="#3b2f1e"/>
  <circle cx="160" cy="160" r="140" fill="#f4efe4"/>
  <circle cx="160" cy="160" r="135" fill="none" stroke="#3b2f1e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="160" cy="160" r="126" fill="none" stroke="#3b2f1e" stroke-width="2"/>

  <!-- Inner filled circle -->
  <circle cx="160" cy="160" r="80" fill="#8b1a1a"/>
  <circle cx="160" cy="160" r="74" fill="none" stroke="#c49a2f" stroke-width="2"/>

  <!-- CFB text -->
  <text x="160" y="155" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="52" fill="#f4efe4" letter-spacing="6">CFB</text>
  <!-- SOCIAL below -->
  <text x="160" y="188" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="24" fill="#c49a2f" letter-spacing="6">SOCIAL</text>

  <!-- Circular text - top arc -->
  <path id="topArc" d="M60,160 A100,100 0 0,1 260,160" fill="none"/>
  <text font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="13" fill="#3b2f1e" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">COLLEGE FOOTBALL</textPath>
  </text>

  <!-- Circular text - bottom arc -->
  <path id="bottomArc" d="M260,175 A100,100 0 0,1 60,175" fill="none"/>
  <text font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="11" fill="#3b2f1e" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EST. 2026 * SOCIAL HOME</textPath>
  </text>

  <!-- Decorative dots between arcs -->
  <circle cx="68" cy="160" r="4" fill="#c49a2f"/>
  <circle cx="252" cy="160" r="4" fill="#c49a2f"/>
</svg>