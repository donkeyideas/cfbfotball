<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 280 370" width="280" height="370">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Source+Sans+3:wght@400;600;700&amp;family=Special+Elite&amp;display=swap');
    </style>
  </defs>

  <!-- Badge body -->
  <rect x="10" y="40" width="260" height="350" rx="8" fill="#f4efe4" stroke="#3b2f1e" stroke-width="3"/>

  <!-- Top crimson bar -->
  <rect x="10" y="40" width="260" height="50" rx="8" fill="#8b1a1a"/>
  <rect x="10" y="70" width="260" height="20" fill="#8b1a1a"/>
  <text x="140" y="74" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="700" font-size="20" fill="#f4efe4" letter-spacing="8">PRESS</text>

  <!-- Inner border -->
  <rect x="22" y="100" width="236" height="278" rx="4" fill="none" stroke="#d4c5a0" stroke-width="1.5"/>

  <!-- CFB SOCIAL -->
  <text x="140" y="145" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="38" fill="#3b2f1e" letter-spacing="5">CFB</text>
  <text x="140" y="180" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="30" fill="#3b2f1e" letter-spacing="3">SOCIAL</text>

  <!-- Divider -->
  <line x1="60" y1="198" x2="220" y2="198" stroke="#c49a2f" stroke-width="2"/>

  <!-- Football icon -->
  <ellipse cx="140" cy="235" rx="30" ry="18" fill="none" stroke="#3b2f1e" stroke-width="2.5"/>
  <line x1="125" y1="235" x2="155" y2="235" stroke="#3b2f1e" stroke-width="2"/>
  <line x1="131" y1="221" x2="131" y2="249" stroke="#3b2f1e" stroke-width="1.2"/>
  <line x1="137" y1="219" x2="137" y2="251" stroke="#3b2f1e" stroke-width="1.2"/>
  <line x1="143" y1="219" x2="143" y2="251" stroke="#3b2f1e" stroke-width="1.2"/>
  <line x1="149" y1="221" x2="149" y2="249" stroke="#3b2f1e" stroke-width="1.2"/>

  <!-- Tagline -->
  <text x="140" y="282" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="11" fill="#6b5d4d" letter-spacing="3">COLLEGE FOOTBALL'S</text>
  <text x="140" y="300" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="11" fill="#6b5d4d" letter-spacing="3">SOCIAL HOME</text>

  <!-- Typewriter-style tagline -->
  <text x="140" y="330" text-anchor="middle" font-family="'Special Elite', 'Courier New', monospace" font-size="11" fill="#8b1a1a">Stakes. Receipts. Dynasty.</text>

  <!-- Bottom bar -->
  <rect x="40" y="348" width="200" height="24" rx="4" fill="#3b2f1e"/>
  <text x="140" y="365" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="11" fill="#c49a2f" letter-spacing="4">EST. 2026</text>
</svg>