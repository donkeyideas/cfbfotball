<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=Source+Sans+3:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- Pennant shape -->
  <polygon points="20,30 480,110 20,190" fill="#8b1a1a" stroke="#3b2f1e" stroke-width="2"/>

  <!-- Inner pennant border -->
  <polygon points="30,42 450,110 30,178" fill="none" stroke="#c49a2f" stroke-width="1.5"/>

  <!-- Main text -->
  <text x="80" y="100" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="40" fill="#f4efe4" letter-spacing="5">CFB SOCIAL</text>

  <!-- Subtitle -->
  <text x="80" y="128" font-family="'Source Sans 3', sans-serif" font-weight="600" font-size="11" fill="#d4c5a0" letter-spacing="5">COLLEGE FOOTBALL'S SOCIAL HOME</text>

  <!-- Football icon -->
  <ellipse cx="370" cy="106" rx="14" ry="9" fill="none" stroke="#f4efe4" stroke-width="1.5"/>
  <line x1="363" y1="106" x2="377" y2="106" stroke="#f4efe4" stroke-width="1"/>
  <line x1="366" y1="100" x2="366" y2="112" stroke="#f4efe4" stroke-width="0.8"/>
  <line x1="370" y1="99" x2="370" y2="113" stroke="#f4efe4" stroke-width="0.8"/>
  <line x1="374" y1="100" x2="374" y2="112" stroke="#f4efe4" stroke-width="0.8"/>

  <!-- Pole -->
  <line x1="20" y1="15" x2="20" y2="205" stroke="#3b2f1e" stroke-width="4"/>
  <circle cx="20" cy="13" r="6" fill="#c49a2f"/>

  <!-- Tail decorative fringe -->
  <line x1="20" y1="190" x2="20" y2="210" stroke="#8b1a1a" stroke-width="3"/>
</svg>