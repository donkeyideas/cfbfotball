name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls -d /Applications/Xcode*.app 2>/dev/null || true

      - name: Select Xcode 26 (required by Expo SDK 55)
        run: |
          # Expo SDK 55 requires Xcode 26 — Xcode 16.x is not supported
          for ver in 26.3 26.2 26.1.1 26.1 26.0.1 26.0; do
            if [ -d "/Applications/Xcode_${ver}.app" ]; then
              echo "Using Xcode ${ver}"
              sudo xcode-select -s "/Applications/Xcode_${ver}.app/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          swift --version

      - name: Resolve TMPDIR symlink (fix /var vs /private/var mismatch)
        run: |
          REAL_TMPDIR=$(python3 -c "import os, tempfile; print(os.path.realpath(tempfile.gettempdir()))")
          echo "TMPDIR=$REAL_TMPDIR" >> $GITHUB_ENV
          echo "Resolved TMPDIR: $REAL_TMPDIR"
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA
        run: EAS_NO_VCS=1 eas build --local --platform ios --profile production --output ${{ github.workspace }}/cfb-social.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfb-social-ios
          path: cfb-social.ipa

      - name: Write App Store Connect API key
        if: success()
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        working-directory: .

      - name: Configure EAS submit with API key
        if: success()
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          node -e "
            const fs = require('fs');
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            eas.submit = eas.submit || {};
            eas.submit.production = eas.submit.production || {};
            eas.submit.production.ios = {
              ascApiKeyId: process.env.APPLE_API_KEY_ID,
              ascApiKeyIssuerId: process.env.APPLE_API_ISSUER_ID,
              ascApiKeyPath: process.env.HOME + '/private_keys/AuthKey_' + process.env.APPLE_API_KEY_ID + '.p8'
            };
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
            console.log('Updated eas.json submit config:', JSON.stringify(eas.submit, null, 2));
          "

      - name: Submit to App Store
        if: success()
        run: eas submit --platform ios --path ${{ github.workspace }}/cfb-social.ipa --non-interactive
