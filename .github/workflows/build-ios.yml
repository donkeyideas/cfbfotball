name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA
        run: eas build --local --platform ios --profile production --output ${{ github.workspace }}/cfb-social.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfb-social-ios
          path: cfb-social.ipa

      - name: Submit to App Store
        if: success()
        run: eas submit --platform ios --path ${{ github.workspace }}/cfb-social.ipa
