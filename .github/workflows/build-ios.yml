name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls -d /Applications/Xcode*.app 2>/dev/null || true

      - name: Select Xcode 16.3 (Swift 6.1)
        run: |
          # Xcode 16.3 = Swift 6.1 which fixes strict concurrency errors in expo-modules-core
          # Do NOT use Xcode 17+/26+ — React Native 0.83 is not compatible (RCTConvert missing)
          # Do NOT use Xcode 16.2 or earlier — Swift 6.0 has hard concurrency errors
          for ver in 16.3 16.4; do
            if [ -d "/Applications/Xcode_${ver}.app" ]; then
              echo "Using Xcode ${ver}"
              sudo xcode-select -s "/Applications/Xcode_${ver}.app/Contents/Developer"
              break
            fi
          done
          # Show selected version
          xcodebuild -version
          swift --version

      - name: Install iOS platform
        run: xcodebuild -downloadPlatform iOS

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA
        run: eas build --local --platform ios --profile production --output ${{ github.workspace }}/cfb-social.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfb-social-ios
          path: cfb-social.ipa

      - name: Submit to App Store
        if: success()
        run: eas submit --platform ios --path ${{ github.workspace }}/cfb-social.ipa
